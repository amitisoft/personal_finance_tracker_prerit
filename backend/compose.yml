services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: personal-finance-postgres
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data:Z

volumes:
  postgres-data:

